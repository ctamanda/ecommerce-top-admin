# Configuracao do banco principal (PostgreSQL local)
quarkus.datasource.db-kind = postgresql
quarkus.datasource.username = postgres
quarkus.datasource.password = 123456
quarkus.datasource.jdbc.url = jdbc:postgresql://localhost:5432/ecommerce-top-admin

# Desabilita Dev Services (nao sobe container automaticamente)
quarkus.devservices.enabled=false

# Estrategia de criacao do schema no boot (ambiente local)
quarkus.hibernate-orm.database.generation=drop-and-create
# quarkus.hibernate-orm.database.generation=none
# quarkus.hibernate-orm.database.generation=update

# Logs SQL para debug local
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.log.bind-parameters=true